name: Trigger Scraping

on:
  schedule:
    - cron: '17 7 * * *'   # 09:17 CEST
    - cron: '17 10 * * *'  # 12:17 CEST
    - cron: '17 13 * * *'  # 15:17 CEST
    - cron: '30 15 * * *'  # 17:30 CEST
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scraping su scraper-annunci
        run: |
          echo "$(date -u) -> triggering scraping.yml"
          curl -f -s -X POST \
            -H "Authorization: Bearer ${{ secrets.SCRAPER_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/giovannighigliotti96-cell/scraper-annunci/actions/workflows/scraping.yml/dispatches" \
            -d '{"ref":"main"}' && echo "OK"
