name: Trigger Scraper Annunci

on:
  schedule:
    - cron: '17 7 * * *'   # 09:17 CEST (scraping)
    - cron: '17 10 * * *'  # 12:17 CEST (scraping)
    - cron: '17 13 * * *'  # 15:17 CEST (scraping)
    - cron: '30 15 * * *'  # 17:30 CEST (scraping)
    - cron: '5 16 * * *'   # 18:05 CEST (email)
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Determine and trigger workflow
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "16" ]; then
            WORKFLOW="email.yml"
          else
            WORKFLOW="scraping.yml"
          fi
          echo "UTC $(date -u +%H:%M) -> triggering $WORKFLOW on scraper-annunci"
          curl -f -s -X POST \
            -H "Authorization: Bearer ${{ secrets.SCRAPER_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/giovannighigliotti96-cell/scraper-annunci/actions/workflows/$WORKFLOW/dispatches" \
            -d '{"ref":"main"}'
          echo "Done."

